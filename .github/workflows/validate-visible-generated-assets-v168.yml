name: Validate Visible Generated Assets v1.6.8

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-visible-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify files
        shell: bash
        run: |
          set -euo pipefail
          test -f source/src/render/visible_generated_assets_v168.js
          test -f tests/visible-generated-assets-v168-harness.js
          test -f source/assets/thousandfold/generated/generated-proof-atlas.part00.b64

      - name: Check JavaScript syntax
        run: |
          node --check source/src/render/visible_generated_assets_v168.js
          node --check source/src/data/tavern_composition.js
          node --check tests/visible-generated-assets-v168-harness.js

      - name: Validate visible Haven asset placement
        run: node tests/visible-generated-assets-v168-harness.js

      - name: Preserve live collision and tactical repairs
        run: node tests/live-runtime-v167-harness.js
