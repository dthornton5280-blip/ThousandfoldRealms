name: Deploy Thousandfold Realms

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare website
        shell: bash
        run: |
          PACKAGE="Thousandfold_Realms_Web_v1.4.5-dev.zip"
          if [ ! -f "$PACKAGE" ]; then
            PACKAGE="Thousandfold_Realms_Web_v1.4.4-dev.zip"
          fi
          test -f "$PACKAGE"
          rm -rf _site
          mkdir -p _site
          unzip -q "$PACKAGE" -d _site
          touch _site/.nojekyll
          test -f _site/index.html

          # Git is the active live source. Keep large binary assets in the
          # packaged build, then overlay committed CSS/JS changes on deploy.
          mkdir -p _site/live-overrides
          find live-overrides -maxdepth 1 -type f \( -name '*.css' -o -name '*.js' \) -exec cp {} _site/live-overrides/ \;

          python - <<'PY'
          import os
          from pathlib import Path

          revision = os.environ.get('GITHUB_SHA', 'dev')[:12]
          override_dir = Path('live-overrides')
          css_files = sorted(p.name for p in override_dir.glob('*.css'))
          js_files = sorted(p.name for p in override_dir.glob('*.js'))
          css_tags = ''.join(
              f'<link rel="stylesheet" href="./live-overrides/{name}?v={revision}">'
              for name in css_files
          )
          js_tags = ''.join(
              f'<script src="./live-overrides/{name}?v={revision}"></script>'
              for name in js_files
          )

          for filename in ('index.html', '404.html'):
              path = Path('_site') / filename
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              marker = '<!-- GIT_LIVE_OVERRIDES -->'
              injection = marker + css_tags + js_tags
              if '</head>' not in text:
                  raise SystemExit(f'{filename} has no closing head tag')
              text = text.replace('</head>', injection + '</head>', 1)
              path.write_text(text, encoding='utf-8')
          PY

          grep -q 'GIT_LIVE_OVERRIDES' _site/index.html
          grep -q 'hud-interaction.css' _site/index.html
          grep -q 'title-screen-v146.css' _site/index.html
          grep -q 'title-screen-v146.js' _site/index.html
          test -f _site/live-overrides/title-screen-v146.css
          test -f _site/live-overrides/title-screen-v146.js
          echo "Deploying $PACKAGE as v1.4.6-dev with Git-managed live overrides"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
