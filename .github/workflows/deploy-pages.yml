name: Deploy Thousandfold Realms

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate canonical source
        shell: bash
        run: |
          set -euo pipefail

          test -d source
          test -f source/index.html
          test -f source/styles.css
          test -f source/src/main.js
          test -f source/src/core/boot.js
          test -d live-overrides
          test -f version.json
          test -f CHANGELOG.md
          test -f AGENTS.md
          test -f docs/CURRENT_STATE.md
          test -f tests/canonical-source-v158-harness.js

          grep -q 'id="tfBootScreen"' source/index.html
          grep -q 'id="tfTitleScreen"' source/index.html
          grep -q 'class="tf-title-mode tf-booting"' source/index.html
          grep -q 'src/core/boot.js' source/index.html
          ! grep -q 'Brand Migration' source/index.html

          while IFS= read -r file; do
            node --check "$file"
          done < <(find source/src live-overrides tests -type f -name '*.js' | sort)

          node tests/world-atlas-v150-harness.js
          node tests/world-direction-v154-harness.js
          node tests/visible-patrols-wildlife-v156-harness.js
          node tests/enemy-patrols-v157-harness.js
          node tests/canonical-source-v158-harness.js

          python - <<'PY'
          from pathlib import Path

          for filename in list(Path('source').rglob('*.css')) + list(Path('live-overrides').glob('*.css')):
              css = filename.read_text(encoding='utf-8')
              if css.count('{') != css.count('}'):
                  raise SystemExit(f'{filename} has unbalanced braces')
          PY

      - name: Assemble website from canonical source
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site
          cp -a source/. _site/
          touch _site/.nojekyll
          cp version.json _site/version.json

          mkdir -p _site/live-overrides
          find live-overrides -maxdepth 1 -type f \( -name '*.css' -o -name '*.js' \) -exec cp {} _site/live-overrides/ \;

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          revision = os.environ.get('GITHUB_SHA', 'dev')[:12]
          version = json.loads(Path('version.json').read_text(encoding='utf-8'))
          override_dir = Path('live-overrides')
          css_files = sorted(path.name for path in override_dir.glob('*.css'))
          js_files = sorted(path.name for path in override_dir.glob('*.js'))

          css_tags = ''.join(
              f'<link rel="stylesheet" href="./live-overrides/{name}?v={revision}">'
              for name in css_files
          )
          js_tags = ''.join(
              f'<script src="./live-overrides/{name}?v={revision}"></script>'
              for name in js_files
          )
          build_meta = (
              f'<meta name="tf-build" content="{version["version"]}">'
              f'<meta name="tf-build-name" content="{version["buildName"]}">'
              f'<meta name="tf-source-model" content="canonical-source-plus-transitional-overrides">'
          )

          path = Path('_site/index.html')
          text = path.read_text(encoding='utf-8')
          main_script = '<script src="src/main.js"></script>'
          if '</head>' not in text or main_script not in text:
              raise SystemExit('Canonical index is missing an assembly marker')

          text = text.replace(
              '</head>',
              '<!-- GIT_LIVE_OVERRIDE_STYLES -->' + build_meta + css_tags + '</head>',
              1,
          )
          text = text.replace(
              main_script,
              '<!-- GIT_LIVE_OVERRIDE_RUNTIME -->' + js_tags + main_script,
              1,
          )
          text = text.replace(
              '<div class="tf-title-version">Current development build</div>',
              f'<div class="tf-title-version">{version["version"]}</div>',
              1,
          )
          path.write_text(text, encoding='utf-8')
          Path('_site/404.html').write_text(text, encoding='utf-8')
          PY

          python - <<'PY'
          from pathlib import Path

          text = Path('_site/index.html').read_text(encoding='utf-8')
          head = text.split('</head>', 1)[0]

          required = (
              'id="tfBootScreen"',
              'id="tfTitleScreen"',
              'GIT_LIVE_OVERRIDE_STYLES',
              'GIT_LIVE_OVERRIDE_RUNTIME',
              'meta name="tf-source-model"',
              'live-overrides/world-atlas-v150.js',
              'live-overrides/zzzz-visible-patrols-wildlife-v156.js',
              'live-overrides/zzzzz-enemy-patrols-v157.js',
              'src/main.js',
              'src/core/boot.js',
          )
          missing = [token for token in required if token not in text]
          if missing:
              raise SystemExit(f'Assembled build is missing: {missing}')

          if 'Brand Migration' in text:
              raise SystemExit('Legacy migration branding remains in the canonical page')
          if 'live-overrides/world-atlas-v150.js' in head:
              raise SystemExit('Runtime overrides were injected before AO exists')

          markers = [
              text.find('src/ui/cartography_ui.js'),
              text.find('live-overrides/world-atlas-v150.js'),
              text.find('live-overrides/zzzz-visible-patrols-wildlife-v156.js'),
              text.find('live-overrides/zzzzz-enemy-patrols-v157.js'),
              text.find('src/main.js'),
              text.find('src/core/boot.js'),
          ]
          if min(markers) < 0 or markers != sorted(markers):
              raise SystemExit(f'Invalid canonical runtime order: {markers}')
          PY

          echo "Assembled Thousandfold Realms directly from source/ with a baked title and boot shield."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
