name: Deploy Thousandfold Realms

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate canonical source
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE="Thousandfold_Realms_Web_v1.4.4-dev.zip"
          test -f "$PACKAGE"
          test -d live-overrides
          test -f live-overrides/hud-interaction.css
          test -f live-overrides/tactical-battlefields-v147.js
          test -f live-overrides/tactical-presentation-v147.css
          test -f live-overrides/title-screen-v146.css
          test -f live-overrides/title-screen-v146.js
          test -f live-overrides/unified-realm-ui-v149.css
          test -f live-overrides/world-atlas-v150.js
          test -f live-overrides/world-atlas-v150.css
          test -f live-overrides/world-atlas-v152-exploration.js
          test -f live-overrides/world-atlas-v152-exploration.css
          test -f tests/world-atlas-v150-harness.js
          test -f version.json
          test -f CHANGELOG.md
          test -f docs/CURRENT_STATE.md

          if find . -maxdepth 1 -type f \( -name 'v*_payload_*.txt' -o -name 'v*_js_*.txt' \) | grep -q .; then
            echo "Temporary payload or JavaScript chunk files found in repository root."
            exit 1
          fi

          while IFS= read -r file; do
            node --check "$file"
          done < <(find live-overrides -maxdepth 1 -type f -name '*.js' | sort)

          node tests/world-atlas-v150-harness.js

          python - <<'PY'
          from pathlib import Path

          checks = {
              "live-overrides/unified-realm-ui-v149.css": (
                  "body:not(.tf-title-mode)", ".creator-screen", ".hud .panel",
                  ".dialogue-card", ".combat-card", "prefers-reduced-motion",
              ),
              "live-overrides/world-atlas-v150.css": (
                  ".atlas-level-tabs", ".atlas-world-map", ".atlas-region-map",
                  ".atlas-location-node", "prefers-reduced-motion",
              ),
              "live-overrides/world-atlas-v152-exploration.css": (
                  ".atlas-pixel-grid", ".atlas-fog-layer", ".atlas-map-key",
                  ".key-fog", "prefers-reduced-motion",
              ),
          }
          for filename, required in checks.items():
              css = Path(filename).read_text(encoding="utf-8")
              if css.count("{") != css.count("}"):
                  raise SystemExit(f"{filename} has unbalanced braces")
              missing = [selector for selector in required if selector not in css]
              if missing:
                  raise SystemExit(f"{filename} is missing required sections: {missing}")
          PY

      - name: Assemble website
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE="Thousandfold_Realms_Web_v1.4.4-dev.zip"
          rm -rf _site
          mkdir -p _site
          unzip -q "$PACKAGE" -d _site
          touch _site/.nojekyll
          test -f _site/index.html

          mkdir -p _site/live-overrides
          find live-overrides -maxdepth 1 -type f \( -name '*.css' -o -name '*.js' \) -exec cp {} _site/live-overrides/ \;

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          revision = os.environ.get("GITHUB_SHA", "dev")[:12]
          version = json.loads(Path("version.json").read_text(encoding="utf-8"))
          override_dir = Path("live-overrides")
          css_files = sorted(path.name for path in override_dir.glob("*.css"))
          js_files = sorted(path.name for path in override_dir.glob("*.js"))

          css_tags = "".join(f'<link rel="stylesheet" href="./live-overrides/{name}?v={revision}">' for name in css_files)
          js_tags = "".join(f'<script src="./live-overrides/{name}?v={revision}"></script>' for name in js_files)
          build_meta = (
              f'<meta name="tf-build" content="{version["version"]}">'
              f'<meta name="tf-build-name" content="{version["buildName"]}">'
          )

          head_marker = "<!-- GIT_LIVE_OVERRIDE_STYLES -->"
          runtime_marker = "<!-- GIT_LIVE_OVERRIDE_RUNTIME -->"
          main_script = '<script src="src/main.js"></script>'

          for filename in ("index.html", "404.html"):
              path = Path("_site") / filename
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              if "</head>" not in text:
                  raise SystemExit(f"{filename} has no closing head tag")
              if main_script not in text:
                  raise SystemExit(f"{filename} has no packaged main-script marker")
              text = text.replace("</head>", head_marker + build_meta + css_tags + "</head>", 1)
              text = text.replace(main_script, runtime_marker + js_tags + main_script, 1)
              path.write_text(text, encoding="utf-8")
          PY

          grep -q 'GIT_LIVE_OVERRIDE_STYLES' _site/index.html
          grep -q 'GIT_LIVE_OVERRIDE_RUNTIME' _site/index.html
          grep -q 'world-atlas-v150.js' _site/index.html
          grep -q 'world-atlas-v152-exploration.js' _site/index.html
          grep -q 'world-atlas-v152-exploration.css' _site/index.html
          test -f _site/live-overrides/world-atlas-v150.js
          test -f _site/live-overrides/world-atlas-v152-exploration.js
          test -f _site/live-overrides/world-atlas-v152-exploration.css

          python - <<'PY'
          from pathlib import Path

          text = Path("_site/index.html").read_text(encoding="utf-8")
          head = text.split("</head>", 1)[0]
          if "world-atlas-v150.js" in head or "world-atlas-v152-exploration.js" in head:
              raise SystemExit("Living Atlas runtime was injected into head before AO exists")

          packaged_ui = text.find('src/ui/cartography_ui.js')
          atlas_runtime = text.find('live-overrides/world-atlas-v150.js')
          exploration_runtime = text.find('live-overrides/world-atlas-v152-exploration.js')
          atlas_fixes = text.find('live-overrides/zz-world-atlas-v150-fixes.js')
          game_bootstrap = text.find('src/main.js')
          if min(packaged_ui, atlas_runtime, exploration_runtime, atlas_fixes, game_bootstrap) < 0:
              raise SystemExit("Missing one or more runtime ordering markers")
          if not packaged_ui < atlas_runtime < exploration_runtime < atlas_fixes < game_bootstrap:
              raise SystemExit("Invalid Atlas runtime order")
          PY

          echo "Assembled canonical Thousandfold Realms build with explored Atlas before game bootstrap."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
