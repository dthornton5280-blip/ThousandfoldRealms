name: Debug Atlas Harness

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Capture harness result
        id: harness
        shell: bash
        run: |
          set +e
          node tests/world-atlas-v150-harness.js initial > atlas-result.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Report result
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '### Atlas harness diagnostic'
            echo '```text'
            cat atlas-result.txt
            echo '```'
          } > comment.md
          gh pr comment "$PR_NUMBER" --body-file comment.md
