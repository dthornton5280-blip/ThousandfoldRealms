name: Extract Canonical Text Source

on:
  push:
    branches:
      - fix/title-combat-v147
    paths:
      - .github/workflows/extract-canonical-source.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: fix/title-combat-v147

      - name: Extract editable text source from verified package
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          from zipfile import ZipFile

          package = Path('Thousandfold_Realms_Web_v1.4.4-dev.zip')
          output = Path('source')
          allowed = {'.html', '.css', '.js', '.json', '.txt', '.md', '.xml', '.svg'}

          if not package.exists():
              raise SystemExit(f'Missing canonical package: {package}')

          if output.exists():
              import shutil
              shutil.rmtree(output)
          output.mkdir(parents=True)

          extracted = []
          skipped_binary = []
          with ZipFile(package) as archive:
              for item in archive.infolist():
                  if item.is_dir():
                      continue
                  relative = PurePosixPath(item.filename)
                  if relative.is_absolute() or '..' in relative.parts:
                      continue
                  if relative.suffix.lower() not in allowed:
                      continue
                  data = archive.read(item)
                  try:
                      text = data.decode('utf-8')
                  except UnicodeDecodeError:
                      skipped_binary.append(item.filename)
                      continue
                  target = output.joinpath(*relative.parts)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_text(text, encoding='utf-8')
                  extracted.append(item.filename)

          manifest = output / 'EXTRACTION.md'
          manifest.write_text(
              '# Extracted Canonical Text Source\n\n'
              'Generated from `Thousandfold_Realms_Web_v1.4.4-dev.zip` so current HTML, CSS, '
              'JavaScript, JSON, and other text assets can be reviewed and maintained normally.\n\n'
              f'- Extracted files: {len(extracted)}\n'
              f'- Text-extension files skipped because they were not UTF-8: {len(skipped_binary)}\n\n'
              'Large binary art, audio, and font assets remain in the verified package.\n',
              encoding='utf-8'
          )
          print('\n'.join(extracted))
          PY

      - name: Commit extracted source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source
          if git diff --cached --quiet; then
            echo "No extracted source changes to commit."
            exit 0
          fi
          git commit -m "Extract canonical editable text source"
          git push origin HEAD:fix/title-combat-v147
