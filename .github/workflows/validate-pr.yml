name: Validate Thousandfold Realms

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          set -euo pipefail
          test -f Thousandfold_Realms_Web_v1.4.4-dev.zip
          test -f live-overrides/world-atlas-v150.js
          test -f live-overrides/world-atlas-v152-exploration.js
          test -f live-overrides/world-atlas-v152-exploration.css
          test -f live-overrides/world-atlas-v152-travel-copy.js
          test -f live-overrides/world-travel-network-v153.js
          test -f live-overrides/world-travel-network-v153a-tiles.js
          test -f live-overrides/world-travel-network-v154-directional.js
          test -f live-overrides/world-atlas-v154-directional.css
          test -f live-overrides/zz-world-atlas-v150-fixes.js
          test -f live-overrides/zzz-world-directional-v154.js
          test -f tests/world-atlas-v150-harness.js
          test -f tests/world-direction-v154-harness.js

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            node --check "$file"
          done < <(find live-overrides -maxdepth 1 -type f -name '*.js' | sort)

      - name: Validate initial Atlas progression
        run: node tests/world-atlas-v150-harness.js initial

      - name: Validate physical and fast travel
        run: node tests/world-atlas-v150-harness.js travel

      - name: Validate Atlas rendering
        run: node tests/world-atlas-v150-harness.js render

      - name: Validate directional geography
        run: node tests/world-direction-v154-harness.js

      - name: Validate Atlas stylesheets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          checks = {
              "live-overrides/world-atlas-v150.css": (
                  ".atlas-level-tabs", ".atlas-world-map", ".atlas-region-map",
                  ".atlas-location-node", "prefers-reduced-motion",
              ),
              "live-overrides/world-atlas-v152-exploration.css": (
                  ".atlas-pixel-grid", ".atlas-fog-layer", ".atlas-map-key",
                  ".key-fog", "prefers-reduced-motion",
              ),
              "live-overrides/world-atlas-v154-directional.css": (
                  ".atlas-exploration-layout", "calc(100dvh - 300px)",
                  ".atlas-compass::before", ".atlas-compass::after", "overflow:auto",
              ),
          }
          for filename, required in checks.items():
              css = Path(filename).read_text(encoding="utf-8")
              if css.count("{") != css.count("}"):
                  raise SystemExit(f"{filename} has unbalanced braces")
              missing = [selector for selector in required if selector not in css]
              if missing:
                  raise SystemExit(f"{filename} is missing required sections: {missing}")
          PY

      - name: Verify assembled runtime order
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          unzip -q Thousandfold_Realms_Web_v1.4.4-dev.zip -d _site
          mkdir -p _site/live-overrides
          find live-overrides -maxdepth 1 -type f \( -name '*.css' -o -name '*.js' \) -exec cp {} _site/live-overrides/ \;

          python - <<'PY'
          from pathlib import Path

          override_dir = Path("live-overrides")
          css_tags = "".join(f'<link rel="stylesheet" href="./live-overrides/{path.name}">' for path in sorted(override_dir.glob("*.css")))
          js_tags = "".join(f'<script src="./live-overrides/{path.name}"></script>' for path in sorted(override_dir.glob("*.js")))
          main_script = '<script src="src/main.js"></script>'

          path = Path("_site/index.html")
          text = path.read_text(encoding="utf-8")
          if "</head>" not in text or main_script not in text:
              raise SystemExit("Packaged HTML markers are missing")
          text = text.replace("</head>", css_tags + "</head>", 1)
          text = text.replace(main_script, js_tags + main_script, 1)
          path.write_text(text, encoding="utf-8")

          head = text.split("</head>", 1)[0]
          runtime_files = (
              "world-atlas-v150.js", "world-atlas-v152-exploration.js",
              "world-atlas-v152-travel-copy.js", "world-travel-network-v153.js",
              "world-travel-network-v153a-tiles.js", "world-travel-network-v154-directional.js",
              "zz-world-atlas-v150-fixes.js", "zzz-world-directional-v154.js",
          )
          if any(name in head for name in runtime_files):
              raise SystemExit("Atlas runtime loaded in head")

          markers = [
              text.find('src/ui/cartography_ui.js'),
              text.find('live-overrides/world-atlas-v150.js'),
              text.find('live-overrides/world-atlas-v152-exploration.js'),
              text.find('live-overrides/world-atlas-v152-travel-copy.js'),
              text.find('live-overrides/world-travel-network-v153.js'),
              text.find('live-overrides/world-travel-network-v153a-tiles.js'),
              text.find('live-overrides/world-travel-network-v154-directional.js'),
              text.find('live-overrides/zz-world-atlas-v150-fixes.js'),
              text.find('live-overrides/zzz-world-directional-v154.js'),
              text.find('src/main.js'),
          ]
          if min(markers) < 0 or markers != sorted(markers):
              raise SystemExit(f"Invalid runtime order: {markers}")
          PY
